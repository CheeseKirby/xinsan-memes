name: Daily New Three Kingdoms meme index update

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh Bilibili series metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/update_bilibili_series.py

      - name: Mine title candidates
        run: python scripts/mine_title_candidates.py

      - name: Update index
        run: python scripts/update_index.py

      - name: Generate meme cards
        run: python scripts/generate_meme_cards.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.json packs/*.json data/bilibili-series.json data/title-candidates.json assets/cards/*.svg
          if git diff --cached --quiet; then
            echo "No index changes."
          else
            git commit -m "Update New Three Kingdoms meme index"
            git push
          fi
