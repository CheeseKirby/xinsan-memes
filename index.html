<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CheeseKirby Meme Index</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f5f2;
        --text: #181817;
        --muted: #65625d;
        --line: #d8d3ca;
        --panel: #fffdfa;
        --accent: #0f766e;
        --accent-text: #ffffff;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #171717;
          --text: #f3f1ec;
          --muted: #aaa39a;
          --line: #34312d;
          --panel: #20201f;
          --accent: #2dd4bf;
          --accent-text: #06201d;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      header {
        display: grid;
        gap: 16px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 7vw, 4.5rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 8px;
        align-items: center;
      }

      input,
      select,
      button {
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--text);
        font: inherit;
      }

      input {
        width: 100%;
        padding: 0 12px;
      }

      select {
        padding: 0 32px 0 10px;
      }

      button {
        padding: 0 14px;
        background: var(--accent);
        color: var(--accent-text);
        border-color: transparent;
        cursor: pointer;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 14px;
      }

      article {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      article a {
        color: inherit;
        text-decoration: none;
      }

      .thumb {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        background: var(--line);
      }

      .body {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      h2 {
        margin: 0;
        font-size: 1rem;
        line-height: 1.3;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .tag {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 8px;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 24px;
        color: var(--muted);
      }

      @media (max-width: 700px) {
        .toolbar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Meme Index</h1>
        <div class="toolbar">
          <input id="query" type="search" placeholder="Search title, tags, or tone" autocomplete="off">
          <select id="language" aria-label="Language">
            <option value="">All</option>
            <option value="zh">ZH</option>
            <option value="en">EN</option>
          </select>
          <button id="shuffle" type="button">Random</button>
        </div>
        <div class="meta" id="meta"></div>
      </header>
      <section class="grid" id="grid"></section>
    </main>

    <script>
      const state = {
        items: [],
        query: "",
        language: ""
      };

      const grid = document.querySelector("#grid");
      const meta = document.querySelector("#meta");
      const queryInput = document.querySelector("#query");
      const languageSelect = document.querySelector("#language");
      const shuffleButton = document.querySelector("#shuffle");

      function textFor(item) {
        return [
          item.title || "",
          item.summary || "",
          ...(item.tags || []),
          ...(item.tone || [])
        ].join(" ").toLowerCase();
      }

      function filteredItems() {
        const query = state.query.trim().toLowerCase();
        return state.items.filter((item) => {
          if (state.language && item.language !== state.language) return false;
          if (!query) return true;
          return query.split(/\s+/).every((part) => textFor(item).includes(part));
        });
      }

      function render(items) {
        meta.textContent = `${items.length} shown / ${state.items.length} indexed`;
        grid.innerHTML = "";

        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No memes matched.";
          grid.appendChild(empty);
          return;
        }

        for (const item of items.slice(0, 80)) {
          const article = document.createElement("article");
          const link = document.createElement("a");
          link.href = item.image_url;
          link.target = "_blank";
          link.rel = "noreferrer";

          const img = document.createElement("img");
          img.className = "thumb";
          img.loading = "lazy";
          img.alt = item.title || "Meme";
          img.src = item.thumbnail_url || item.image_url;

          const body = document.createElement("div");
          body.className = "body";

          const title = document.createElement("h2");
          title.textContent = item.title || "Untitled meme";

          const tags = document.createElement("div");
          tags.className = "tags";
          for (const tag of [...(item.tags || []), ...(item.tone || [])].slice(0, 6)) {
            const badge = document.createElement("span");
            badge.className = "tag";
            badge.textContent = tag;
            tags.appendChild(badge);
          }

          body.append(title, tags);
          link.append(img, body);
          article.appendChild(link);
          grid.appendChild(article);
        }
      }

      queryInput.addEventListener("input", (event) => {
        state.query = event.target.value;
        render(filteredItems());
      });

      languageSelect.addEventListener("change", (event) => {
        state.language = event.target.value;
        render(filteredItems());
      });

      shuffleButton.addEventListener("click", () => {
        const items = filteredItems();
        for (let index = items.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [items[index], items[swapIndex]] = [items[swapIndex], items[index]];
        }
        render(items);
      });

      fetch("index.json", { cache: "no-store" })
        .then((response) => response.json())
        .then((index) => {
          state.items = (index.items || []).filter((item) => item.safe !== false);
          render(filteredItems());
        })
        .catch(() => {
          meta.textContent = "Failed to load index.json";
        });
    </script>
  </body>
</html>
